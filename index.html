<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My English Words</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #E0E7FF 0%, #C7D2FE 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        h1 {
            color: #3730A3;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }

        .card-container {
            width: 100%;
            max-width: 400px;
        }

        .card {
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(79, 70, 229, 0.15);
            padding: 32px 28px;
            text-align: center;
            height: auto;
            display: flex;
            flex-direction: column;
        }

        .card-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            margin-bottom: 28px;
            object-fit: cover;
        }

        .word {
            font-size: 2.5rem;
            font-weight: 800;
            color: #4338CA;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .sentence {
            font-size: 1.3rem;
            color: #4B5563;
            line-height: 1.5;
            padding: 0 4px;
            flex: 1;
        }

        .progress {
            margin-top: 24px;
            font-size: 1.1rem;
            color: #6366F1;
            font-weight: 600;
        }

        .btn-row {
            margin-top: 28px;
            width: 100%;
            max-width: 400px;
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            flex: 1;
            padding: 18px 32px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #FFFFFF;
            background: linear-gradient(135deg, #6366F1, #4F46E5);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .nav-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
        }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 24px;
            gap: 4px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 11px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            background: transparent;
            color: #6366F1;
            -webkit-tap-highlight-color: transparent;
        }

        .mode-btn.active {
            background: #FFFFFF;
            color: #4338CA;
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.15);
        }

        /* Quiz Styles */
        .quiz-container {
            width: 100%;
            max-width: 400px;
            display: none;
        }

        .quiz-card {
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(79, 70, 229, 0.15);
            padding: 32px 28px;
            text-align: center;
        }

        .quiz-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            margin-bottom: 24px;
            object-fit: cover;
        }

        .quiz-sentence {
            font-size: 1.3rem;
            color: #4B5563;
            line-height: 1.6;
            margin-bottom: 24px;
            padding: 0 4px;
        }

        .quiz-blank {
            display: inline-block;
            min-width: 80px;
            border-bottom: 3px solid #6366F1;
            color: #6366F1;
            font-weight: 700;
            padding: 0 4px;
            margin: 0 2px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            padding: 14px 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #4338CA;
            background: #FFFFFF;
            border: 2.5px solid #C7D2FE;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.12s, border-color 0.15s, background 0.15s;
            -webkit-tap-highlight-color: transparent;
            word-break: break-word;
        }

        .option-btn:active:not(.disabled) {
            transform: scale(0.96);
        }

        .option-btn.correct {
            background: #D1FAE5;
            border-color: #34D399;
            color: #065F46;
        }

        .option-btn.wrong {
            background: #FEE2E2;
            border-color: #F87171;
            color: #991B1B;
        }

        .option-btn.disabled {
            cursor: default;
            opacity: 0.7;
        }

        .option-btn.disabled.correct {
            opacity: 1;
        }

        .quiz-feedback {
            font-size: 1.2rem;
            font-weight: 700;
            min-height: 1.5em;
            margin-bottom: 16px;
        }

        .quiz-feedback.correct {
            color: #059669;
        }

        .quiz-feedback.wrong {
            color: #DC2626;
        }

        .quiz-next-btn {
            display: none;
            width: 100%;
            padding: 16px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #FFFFFF;
            background: linear-gradient(135deg, #6366F1, #4F46E5);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.15s;
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3);
            -webkit-tap-highlight-color: transparent;
            margin-bottom: 16px;
        }

        .quiz-next-btn:active {
            transform: scale(0.97);
        }

        .quiz-score {
            font-size: 1rem;
            color: #6366F1;
            font-weight: 600;
        }

        /* End screen */
        .quiz-end {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .quiz-end .end-emoji {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .quiz-end .end-score {
            font-size: 1.8rem;
            font-weight: 800;
            color: #4338CA;
            margin-bottom: 8px;
        }

        .quiz-end .end-message {
            font-size: 1.2rem;
            color: #4B5563;
            margin-bottom: 24px;
            line-height: 1.5;
        }
    </style>
</head>

        let current = 0;

        function showCard() {
            document.getElementById("word").textContent = words[current].word;
            document.getElementById("sentence").textContent = words[current].sentence;
            document.getElementById("cardImage").src = words[current].image;
            document.getElementById("cardImage").alt = words[current].word;
            document.getElementById("progress").textContent = (current + 1) + " / " + words.length;
        }

        document.getElementById("backBtn").addEventListener("click", function () {
            current = (current - 1 + words.length) % words.length;
            showCard();
        });

        document.getElementById("nextBtn").addEventListener("click", function () {
            current = (current + 1) % words.length;
            showCard();
        });

        showCard();

        // === Quiz Game Logic ===

        let quizOrder = [];
        let quizIndex = 0;
        let score = 0;
        let answered = false;

        const correctMessages = ["Great job!", "You got it!", "Wonderful!", "Exactly right!", "Well done!", "Perfect!"];
        const wrongMessages = ["Good try!", "Almost!", "Keep going!"];

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function startQuiz() {
            quizOrder = shuffle([...Array(words.length).keys()]);

            answered = false;
            document.getElementById("quizEnd").style.display = "none";
            document.getElementById("quizGame").style.display = "block";
            showQuestion();
        }

        function showQuestion() {
            answered = false;
            const item = words[quizOrder[quizIndex]];
            const blankText = item.blank || item.word;
            const regex = new RegExp(escapeRegex(blankText), 'i');
            const sentenceHTML = item.quizSentence.replace(regex, '<span class="quiz-blank">_______</span>');

            document.getElementById("quizImage").src = item.quizImage;
            document.getElementById("quizImage").alt = "Hint image";
            document.getElementById("quizSentence").innerHTML = sentenceHTML;
            document.getElementById("quizFeedback").textContent = "";
            document.getElementById("quizFeedback").className = "quiz-feedback";
            document.getElementById("quizNextBtn").style.display = "none";
            document.getElementById("quizScore").textContent =
                score + " / " + (quizIndex) + " correct  ·  Question " + (quizIndex + 1) + " of " + words.length;

            // Pick 3 wrong options
            const wrongIndices = shuffle(
                [...Array(words.length).keys()].filter(i => i !== quizOrder[quizIndex])
            ).slice(0, 3);

            const options = shuffle([
                { text: item.word, correct: true },
                ...wrongIndices.map(i => ({ text: words[i].word, correct: false }))
            ]);

            const grid = document.getElementById("optionsGrid");
            grid.innerHTML = "";
            options.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.textContent = opt.text;
                btn.addEventListener("click", function () {
                    if (answered) return;
                    selectAnswer(btn, opt.correct, item.word, grid);
                });
                grid.appendChild(btn);
            });
        }

        function selectAnswer(selectedBtn, isCorrect, correctWord, grid) {
            answered = true;
            const allBtns = grid.querySelectorAll(".option-btn");

            allBtns.forEach(btn => {
                btn.classList.add("disabled");
                if (btn.textContent === correctWord) {
                    btn.classList.add("correct");
                }
            });

            const feedback = document.getElementById("quizFeedback");
            if (isCorrect) {
                score++;
                feedback.textContent = correctMessages[Math.floor(Math.random() * correctMessages.length)];
                feedback.className = "quiz-feedback correct";
            } else {
                selectedBtn.classList.add("wrong");
                feedback.textContent = wrongMessages[Math.floor(Math.random() * wrongMessages.length)] +
                    " The answer is: " + correctWord;
                feedback.className = "quiz-feedback wrong";
            }

            document.getElementById("quizScore").textContent =
                score + " / " + (quizIndex + 1) + " correct  ·  Question " + (quizIndex + 1) + " of " + words.length;
            document.getElementById("quizNextBtn").style.display = "block";
        }

        document.getElementById("quizNextBtn").addEventListener("click", function () {
            quizIndex++;
            if (quizIndex >= words.length) {
                showEndScreen();
            } else {
                showQuestion();
            }
        });

        function showEndScreen() {
            document.getElementById("quizGame").style.display = "none";
            const endDiv = document.getElementById("quizEnd");
            endDiv.style.display = "block";

            const pct = Math.round((score / words.length) * 100);
            let emoji, message;
            if (pct >= 90) {
                emoji = "🌟";
                message = "Amazing! You really know these words!";
            } else if (pct >= 70) {
                emoji = "😊";
                message = "Great work! You are doing wonderfully!";
            } else if (pct >= 50) {
                emoji = "💪";
                message = "Good effort! Practice makes perfect!";
            } else {
                emoji = "📚";
                message = "Keep learning! You will get better every time!";
            }

            document.getElementById("endEmoji").textContent = emoji;
            document.getElementById("endScore").textContent = score + " / " + words.length + " correct";
            document.getElementById("endMessage").textContent = message;
        }

        document.getElementById("playAgainBtn").addEventListener("click", startQuiz);

        // === Mode Switching ===

        const flashcardsTab = document.getElementById("flashcardsTab");
        const quizTab = document.getElementById("quizTab");
        const cardContainer = document.querySelector(".card-container");
        const progressEl = document.getElementById("progress");
        const btnRow = document.querySelector(".btn-row");
        const quizContainer = document.getElementById("quizContainer");

        flashcardsTab.addEventListener("click", function () {
            flashcardsTab.classList.add("active");
            quizTab.classList.remove("active");
            cardContainer.style.display = "";
            progressEl.style.display = "";
            btnRow.style.display = "";
            quizContainer.style.display = "none";
        });

        quizTab.addEventListener("click", function () {
            quizTab.classList.add("active");
            flashcardsTab.classList.remove("active");
            cardContainer.style.display = "none";
            progressEl.style.display = "none";
            btnRow.style.display = "none";
            quizContainer.style.display = "block";
            startQuiz();
        });
    </script>
</body>
</html>
