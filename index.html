<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My English Words</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #E0E7FF 0%, #C7D2FE 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        h1 {
            color: #3730A3;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }

        .card-container {
            width: 100%;
            max-width: 400px;
        }

        .card {
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(79, 70, 229, 0.15);
            padding: 32px 28px;
            text-align: center;
            height: auto;
            display: flex;
            flex-direction: column;
        }

        .card-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            margin-bottom: 28px;
            object-fit: cover;
        }

        .word {
            font-size: 2.5rem;
            font-weight: 800;
            color: #4338CA;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .sentence {
            font-size: 1.3rem;
            color: #4B5563;
            line-height: 1.5;
            padding: 0 4px;
            flex: 1;
        }

        .progress {
            margin-top: 24px;
            font-size: 1.1rem;
            color: #6366F1;
            font-weight: 600;
        }

        .btn-row {
            margin-top: 28px;
            width: 100%;
            max-width: 400px;
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            flex: 1;
            padding: 18px 32px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #FFFFFF;
            background: linear-gradient(135deg, #6366F1, #4F46E5);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .nav-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
        }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 24px;
            gap: 4px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px 10px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 11px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            background: transparent;
            color: #6366F1;
            -webkit-tap-highlight-color: transparent;
        }

        .mode-btn.active {
            background: #FFFFFF;
            color: #4338CA;
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.15);
        }

        /* Quiz Styles */
        .quiz-container {
            width: 100%;
            max-width: 400px;
            display: none;
        }

        .quiz-card {
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(79, 70, 229, 0.15);
            padding: 32px 28px;
            text-align: center;
        }

        .quiz-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            margin-bottom: 24px;
            object-fit: cover;
        }

        .quiz-sentence {
            font-size: 1.3rem;
            color: #4B5563;
            line-height: 1.6;
            margin-bottom: 24px;
            padding: 0 4px;
        }

        .quiz-blank {
            display: inline-block;
            min-width: 80px;
            border-bottom: 3px solid #6366F1;
            color: #6366F1;
            font-weight: 700;
            padding: 0 4px;
            margin: 0 2px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            padding: 14px 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #4338CA;
            background: #FFFFFF;
            border: 2.5px solid #C7D2FE;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.12s, border-color 0.15s, background 0.15s;
            -webkit-tap-highlight-color: transparent;
            word-break: break-word;
        }

        .option-btn:active:not(.disabled) {
            transform: scale(0.96);
        }

        .option-btn.correct {
            background: #D1FAE5;
            border-color: #34D399;
            color: #065F46;
        }

        .option-btn.wrong {
            background: #FEE2E2;
            border-color: #F87171;
            color: #991B1B;
        }

        .option-btn.disabled {
            cursor: default;
            opacity: 0.7;
        }

        .option-btn.disabled.correct {
            opacity: 1;
        }

        .quiz-feedback {
            font-size: 1.2rem;
            font-weight: 700;
            min-height: 1.5em;
            margin-bottom: 16px;
        }

        .quiz-feedback.correct {
            color: #059669;
        }

        .quiz-feedback.wrong {
            color: #DC2626;
        }

        .quiz-next-btn {
            display: none;
            width: 100%;
            padding: 16px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #FFFFFF;
            background: linear-gradient(135deg, #6366F1, #4F46E5);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.15s;
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3);
            -webkit-tap-highlight-color: transparent;
            margin-bottom: 16px;
        }

        .quiz-next-btn:active {
            transform: scale(0.97);
        }

        .quiz-score {
            font-size: 1rem;
            color: #6366F1;
            font-weight: 600;
        }

        /* End screen */
        .quiz-end {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .quiz-end .end-emoji {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .quiz-end .end-score {
            font-size: 1.8rem;
            font-weight: 800;
            color: #4338CA;
            margin-bottom: 8px;
        }

        .quiz-end .end-message {
            font-size: 1.2rem;
            color: #4B5563;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* === Story Reader Styles === */

        .story-container {
            width: 100%;
            max-width: 400px;
            display: none;
        }

        .story-card {
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(79, 70, 229, 0.15);
            padding: 32px 24px;
        }

        .story-toc-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #4338CA;
            text-align: center;
            margin-bottom: 4px;
        }

        .story-toc-title-he {
            font-size: 1.3rem;
            font-weight: 600;
            color: #6366F1;
            text-align: center;
            margin-bottom: 24px;
            direction: rtl;
        }

        .story-toc-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .story-toc-item {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            padding: 18px 20px;
            font-size: 1.25rem;
            font-weight: 600;
            color: #4338CA;
            background: #F0EDFF;
            border: 2.5px solid #C7D2FE;
            border-radius: 16px;
            cursor: pointer;
            text-align: left;
            transition: transform 0.12s, background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .story-toc-item:active {
            transform: scale(0.97);
            background: #E0DDFF;
        }

        .story-toc-item-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366F1, #4F46E5);
            color: #FFFFFF;
            font-size: 1.2rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .story-toc-item-title {
            flex: 1;
        }

        /* Chapter Reader */
        .story-header {
            border-bottom: 2px solid #E0E7FF;
            padding-bottom: 14px;
            margin-bottom: 20px;
        }

        .story-chapter-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #4338CA;
            margin-bottom: 6px;
        }

        .story-page-indicator {
            font-size: 1.1rem;
            font-weight: 600;
            color: #6366F1;
        }

        .story-progress-bar {
            width: 100%;
            height: 6px;
            background: #E0E7FF;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .story-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366F1, #4F46E5);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .story-page-content {
            font-size: 1.5rem;
            color: #1F2937;
            line-height: 1.8;
            min-height: 200px;
            padding: 8px 0;
        }

        .story-page-content p {
            margin-bottom: 16px;
        }

        .story-nav {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .story-main-btn {
            width: 100%;
            padding: 20px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #FFFFFF;
            background: linear-gradient(135deg, #6366F1, #4F46E5);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .story-main-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
        }

        .story-back-page-btn {
            width: 100%;
            padding: 14px;
            font-size: 1.15rem;
            font-weight: 600;
            color: #6366F1;
            background: #F0EDFF;
            border: 2px solid #C7D2FE;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.12s;
            -webkit-tap-highlight-color: transparent;
        }

        .story-back-page-btn:active {
            transform: scale(0.97);
        }

        .story-back-page-btn.hidden {
            display: none;
        }

        .story-toc-btn {
            display: block;
            width: 100%;
            margin-top: 16px;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #4338CA;
            background: rgba(255, 255, 255, 0.8);
            border: 2.5px solid #C7D2FE;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.12s;
            -webkit-tap-highlight-color: transparent;
            text-align: center;
        }

        .story-toc-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>
    <h1>My English Words</h1>

    <div class="mode-toggle">
        <button class="mode-btn active" id="flashcardsTab">Flashcards</button>
        <button class="mode-btn" id="quizTab">Quiz Game</button>
        <button class="mode-btn" id="storyTab">Story</button>
    </div>

    <div class="card-container">
        <div class="card">
            <img class="card-image" id="cardImage" src="" alt="">
            <div class="word" id="word"></div>
            <div class="sentence" id="sentence"></div>
        </div>
    </div>

    <div class="progress" id="progress"></div>

    <div class="btn-row">
        <button class="nav-btn" id="backBtn">← Back</button>
        <button class="nav-btn" id="nextBtn">Next →</button>
    </div>

    <!-- Quiz Game -->
    <div class="quiz-container" id="quizContainer">
        <div class="quiz-card">
            <div id="quizGame">
                <img class="quiz-image" id="quizImage" src="" alt="">
                <div class="quiz-sentence" id="quizSentence"></div>
                <div class="options-grid" id="optionsGrid"></div>
                <div class="quiz-feedback" id="quizFeedback"></div>
                <button class="quiz-next-btn" id="quizNextBtn">Next Question →</button>
                <div class="quiz-score" id="quizScore"></div>
            </div>
            <div class="quiz-end" id="quizEnd">
                <div class="end-emoji" id="endEmoji"></div>
                <div class="end-score" id="endScore"></div>
                <div class="end-message" id="endMessage"></div>
                <button class="quiz-next-btn" style="display:block" id="playAgainBtn">Play Again</button>
            </div>
        </div>
    </div>

    <!-- Story Reader -->
    <div class="story-container" id="storyContainer">

        <!-- Table of Contents View -->
        <div class="story-toc" id="storyToc">
            <div class="story-card">
                <div class="story-toc-title" id="storyTitle">The Letters We Never Sent</div>
                <div class="story-toc-title-he">תוכן עניינים</div>
                <div class="story-toc-list" id="storyTocList"></div>
            </div>
        </div>

        <!-- Chapter Reading View -->
        <div class="story-reader" id="storyReader" style="display:none">
            <div class="story-card">
                <div class="story-header">
                    <div class="story-chapter-title" id="storyChapterTitle"></div>
                    <div class="story-page-indicator" id="storyPageIndicator"></div>
                    <div class="story-progress-bar">
                        <div class="story-progress-fill" id="storyProgressFill"></div>
                    </div>
                </div>
                <div class="story-page-content" id="storyPageContent"></div>
                <div class="story-nav">
                    <button class="story-back-page-btn hidden" id="storyPrevPageBtn">← Previous Page</button>
                    <button class="story-main-btn" id="storyNextPageBtn">Next Page →</button>
                </div>
            </div>
            <button class="story-toc-btn" id="storyBackToTocBtn">☰ Table of Contents</button>
        </div>
    </div>

    <script>
        const words = [
            { word: "Drizzle", sentence: "Take an umbrella — there is a light drizzle outside.", quizSentence: "We went for a walk in the drizzle and got a little wet.", image: "images/drizzle.png", quizImage: "https://images.unsplash.com/photo-1523889739556-7d3a75db3e35?w=400&fit=crop" },
            { word: "Intermittent", sentence: "The Wi-Fi signal was intermittent — it kept cutting out and coming back.", quizSentence: "The rain was intermittent — it stopped and started all afternoon.", image: "images/intermittent.png", quizImage: "https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?w=400&fit=crop" },
            { word: "Likely", sentence: "She is likely to get the job — her interview went very well.", quizSentence: "It is likely to rain tomorrow, so bring a jacket.", image: "images/likely.png", quizImage: "https://images.unsplash.com/photo-1762328493889-516b52b3aa7d?w=400&fit=crop" },
            { word: "Shortchange", sentence: "The cashier tried to shortchange me by giving back less money.", quizSentence: "Always count your coins — you don't want anyone to shortchange you.", image: "images/shortchange.png", quizImage: "https://images.unsplash.com/photo-1503688891477-6cdfff1f7b53?w=400&fit=crop" },
            { word: "Settle", sentence: "After years of traveling, she decided to settle in a quiet town.", quizSentence: "They want to settle in the countryside and start a new life.", image: "images/settle.png", quizImage: "https://images.unsplash.com/photo-1574780986957-74f4ee225b87?w=400&fit=crop" },
            { word: "Rose-tinted", sentence: "He sees the past through rose-tinted glasses, as if everything was perfect.", quizSentence: "She looks at her school days through rose-tinted glasses, forgetting the hard parts.", image: "images/rose-tinted.png", quizImage: "https://images.unsplash.com/photo-1533158307587-828f0a76ef46?w=400&fit=crop", blank: "rose-tinted" },
            { word: "Soluble", sentence: "Sugar is soluble — it disappears when you stir it into water.", quizSentence: "This powder is soluble — just mix it with warm water and drink it.", image: "images/soluble.png", quizImage: "https://images.unsplash.com/photo-1509785307050-d4066910ec1e?w=400&fit=crop" },
            { word: "Like water off a duck's back", sentence: "I told him he was wrong, but it was like water off a duck's back — he didn't care at all.", quizSentence: "She never worries about bad comments — they are like water off a duck's back to her.", image: "images/like-water-off-a-ducks-back.png", quizImage: "https://images.unsplash.com/photo-1675711082126-3c0546f0d0cf?w=400&fit=crop", blank: "like water off a duck's back" },

            { word: "Beverages", sentence: "The menu lists hot and cold beverages like tea, coffee, and juice.", quizSentence: "Would you like some beverages? We have water, lemonade, and tea.", image: "images/beverages.png", quizImage: "https://images.unsplash.com/photo-1656936611703-a1ede070073c?w=400&fit=crop", blank: "beverages" },

        // === Quiz Game Logic ===

        let quizOrder = [];
        let quizIndex = 0;
        let score = 0;
        let answered = false;

        const correctMessages = ["Great job!", "You got it!", "Wonderful!", "Exactly right!", "Well done!", "Perfect!"];
        const wrongMessages = ["Good try!", "Almost!", "Keep going!"];

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function startQuiz() {
            quizOrder = shuffle([...Array(words.length).keys()]);
            quizIndex = 0;
            score = 0;
            answered = false;
            document.getElementById("quizEnd").style.display = "none";
            document.getElementById("quizGame").style.display = "block";
            showQuestion();
        }

        function showQuestion() {
            answered = false;
            const item = words[quizOrder[quizIndex]];
            const blankText = item.blank || item.word;
            const regex = new RegExp(escapeRegex(blankText), 'i');
            const sentenceHTML = item.quizSentence.replace(regex, '<span class="quiz-blank">_______</span>');

            document.getElementById("quizImage").src = item.quizImage;
            document.getElementById("quizImage").alt = "Hint image";
            document.getElementById("quizSentence").innerHTML = sentenceHTML;
            document.getElementById("quizFeedback").textContent = "";
            document.getElementById("quizFeedback").className = "quiz-feedback";
            document.getElementById("quizNextBtn").style.display = "none";
            document.getElementById("quizScore").textContent =
                score + " / " + (quizIndex) + " correct  ·  Question " + (quizIndex + 1) + " of " + words.length;

            // Pick 3 wrong options
            const wrongIndices = shuffle(
                [...Array(words.length).keys()].filter(i => i !== quizOrder[quizIndex])
            ).slice(0, 3);

            const options = shuffle([
                { text: item.word, correct: true },
                ...wrongIndices.map(i => ({ text: words[i].word, correct: false }))
            ]);

            const grid = document.getElementById("optionsGrid");
            grid.innerHTML = "";
            options.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.textContent = opt.text;
                btn.addEventListener("click", function () {
                    if (answered) return;
                    selectAnswer(btn, opt.correct, item.word, grid);
                });
                grid.appendChild(btn);
            });
        }

        function selectAnswer(selectedBtn, isCorrect, correctWord, grid) {
            answered = true;
            const allBtns = grid.querySelectorAll(".option-btn");

            allBtns.forEach(btn => {
                btn.classList.add("disabled");
                if (btn.textContent === correctWord) {
                    btn.classList.add("correct");
                }
            });

            const feedback = document.getElementById("quizFeedback");
            if (isCorrect) {
                score++;
                feedback.textContent = correctMessages[Math.floor(Math.random() * correctMessages.length)];
                feedback.className = "quiz-feedback correct";
            } else {
                selectedBtn.classList.add("wrong");
                feedback.textContent = wrongMessages[Math.floor(Math.random() * wrongMessages.length)] +
                    " The answer is: " + correctWord;
                feedback.className = "quiz-feedback wrong";
            }

            document.getElementById("quizScore").textContent =
                score + " / " + (quizIndex + 1) + " correct  ·  Question " + (quizIndex + 1) + " of " + words.length;
            document.getElementById("quizNextBtn").style.display = "block";
        }

        document.getElementById("quizNextBtn").addEventListener("click", function () {
            quizIndex++;
            if (quizIndex >= words.length) {
                showEndScreen();
            } else {
                showQuestion();
            }
        });

        function showEndScreen() {
            document.getElementById("quizGame").style.display = "none";
            const endDiv = document.getElementById("quizEnd");
            endDiv.style.display = "block";

            const pct = Math.round((score / words.length) * 100);
            let emoji, message;
            if (pct >= 90) {
                emoji = "🌟";
                message = "Amazing! You really know these words!";
            } else if (pct >= 70) {
                emoji = "😊";
                message = "Great work! You are doing wonderfully!";
            } else if (pct >= 50) {
                emoji = "💪";
                message = "Good effort! Practice makes perfect!";
            } else {
                emoji = "📚";
                message = "Keep learning! You will get better every time!";
            }

            document.getElementById("endEmoji").textContent = emoji;
            document.getElementById("endScore").textContent = score + " / " + words.length + " correct";
            document.getElementById("endMessage").textContent = message;
        }

        document.getElementById("playAgainBtn").addEventListener("click", startQuiz);

            document.getElementById("storyChapterTitle").textContent = chapter.title;
            document.getElementById("storyPageIndicator").textContent =
                "Page " + (storyPage + 1) + " of " + totalPages;

            var progressFill = document.getElementById("storyProgressFill");
            progressFill.style.width = (((storyPage + 1) / totalPages) * 100) + "%";

            var content = chapter.pages[storyPage];
            var paragraphs = content.split("\n\n");
            var html = paragraphs.map(function (p) {
                p = p.replace(/\*(.*?)\*/g, "<em>$1</em>");
                return "<p>" + p + "</p>";
            }).join("");
            document.getElementById("storyPageContent").innerHTML = html;

            var prevBtn = document.getElementById("storyPrevPageBtn");
            if (storyPage === 0) {
                prevBtn.classList.add("hidden");
            } else {
                prevBtn.classList.remove("hidden");
            }

            var nextBtn = document.getElementById("storyNextPageBtn");
            if (storyPage < totalPages - 1) {
                nextBtn.textContent = "Next Page →";
            } else if (storyChapter < storyData.chapters.length - 1) {
                nextBtn.textContent = "Next Chapter →";
            } else {
                nextBtn.textContent = "✓ Finished!";
            }

            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        document.getElementById("storyNextPageBtn").addEventListener("click", function () {
            var chapter = storyData.chapters[storyChapter];
            if (storyPage < chapter.pages.length - 1) {
                storyPage++;
                showStoryPage();
            } else if (storyChapter < storyData.chapters.length - 1) {
                storyChapter++;
                storyPage = 0;
                showStoryPage();
            } else {
                showStoryToc();
            }
        });

        document.getElementById("storyPrevPageBtn").addEventListener("click", function () {
            if (storyPage > 0) {
                storyPage--;
                showStoryPage();
            }
        });

        document.getElementById("storyBackToTocBtn").addEventListener("click", function () {
            showStoryToc();
        });

        // === Mode Switching ===

        const flashcardsTab = document.getElementById("flashcardsTab");
        const quizTab = document.getElementById("quizTab");
        const storyTab = document.getElementById("storyTab");
        const cardContainer = document.querySelector(".card-container");
        const progressEl = document.getElementById("progress");
        const btnRow = document.querySelector(".btn-row");
        const quizContainer = document.getElementById("quizContainer");
        const storyContainer = document.getElementById("storyContainer");

        function switchMode(mode) {
            flashcardsTab.classList.remove("active");
            quizTab.classList.remove("active");
            storyTab.classList.remove("active");

            cardContainer.style.display = "none";
            progressEl.style.display = "none";
            btnRow.style.display = "none";
            quizContainer.style.display = "none";
            storyContainer.style.display = "none";

            if (mode === "flashcards") {
                flashcardsTab.classList.add("active");
                cardContainer.style.display = "";
                progressEl.style.display = "";
                btnRow.style.display = "";
            } else if (mode === "quiz") {
                quizTab.classList.add("active");
                quizContainer.style.display = "block";
                startQuiz();
            } else if (mode === "story") {
                storyTab.classList.add("active");
                storyContainer.style.display = "block";
                showStoryToc();
            }
        }

        flashcardsTab.addEventListener("click", function () { switchMode("flashcards"); });
        quizTab.addEventListener("click", function () { switchMode("quiz"); });
        storyTab.addEventListener("click", function () { switchMode("story"); });
    </script>
</body>
</html>
